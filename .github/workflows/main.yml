name: Auto Update

on:
  push:
  issue_comment:
    types: [ created ]
  schedule:
    - cron: '10 0/1 * * *'

jobs:
  AutoUpdate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: GetScript
        uses: actions/checkout@v4
        with:
          repository: ArknightsSearch/ArknightsSearch-data
          path: script

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.14'

      - name: Sync dependencies
        run: uv sync
        working-directory: script

      - name: Fetch game data
        run: uv run python fetch_gamedata.py
        working-directory: script

      - name: Parse game data
        run: uv run python start.py
        working-directory: script

      - name: Sync generated data to workspace
        run: |
          cp -r script/data/ data/
          cp -r script/hash/ hash/

      - name: Update
        run: python .github/scripts/update.py

      - name: Upload
        env:
          SERVER: ${{ secrets.SERVER }}
          KEY: ${{ secrets.KEY }}
        run: uv run --directory script python ${{ github.workspace }}/.github/scripts/upload.py
        if: env.update == 1

      - name: Commit Change
        run: |
          python .github/scripts/commit.py
          git push
        if: env.update == 1

      - name: Generate Token
        id: token
        uses: tibdex/github-app-token@v1
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.APP_KEY }}
          repository: ArknightsSearch/ArknightsSearch-resource
        if: env.update == 1

      - name: GetResourceRepo
        uses: actions/checkout@v4
        with:
          repository: ArknightsSearch/ArknightsSearch-resource
          path: resource
          token: ${{ steps.token.outputs.token }}
        if: env.update == 1

      - name: Commit Resource Change
        env:
          MESSAGE: ${{ env.MESSAGE }}
        run: |
          rm -rf resource/data
          \cp -rf data resource
          cd resource
          git config --global user.name MeeBooBot_v0
          git config --global user.email noreply@arkfans.top
          git add data
          git commit -m "$MESSAGE"
          git push
        if: env.update == 1
